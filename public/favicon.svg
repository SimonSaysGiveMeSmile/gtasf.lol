<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32" role="img" aria-label="Founder Simulator favicon">
  <title>Founder Simulator</title>
  <desc>Neon-styled favicon featuring a glowing F lettermark with SF skyline silhouette in cyberpunk cyan and magenta</desc>

  <defs>
    <!-- Background gradient: deep midnight -->
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#040810"/>
    </linearGradient>

    <!-- Cyan neon glow filter -->
    <filter id="neonGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.2" result="blur1"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="0.4" result="blur2"/>
      <feMerge>
        <feMergeNode in="blur1"/>
        <feMergeNode in="blur2"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Soft ambient glow for background elements -->
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="0.6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Intense inner glow for the lettermark -->
    <filter id="innerGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.8" result="blur1"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="0.6" result="blur2"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="0.2" result="blur3"/>
      <feMerge>
        <feMergeNode in="blur1"/>
        <feMergeNode in="blur2"/>
        <feMergeNode in="blur3"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="32" height="32" rx="5" ry="5" fill="url(#bgGrad)"/>

  <!-- Subtle grid lines for tech/startup feel -->
  <g stroke="#00e5ff" stroke-opacity="0.07" stroke-width="0.5">
    <line x1="0" y1="8" x2="32" y2="8"/>
    <line x1="0" y1="16" x2="32" y2="16"/>
    <line x1="0" y1="24" x2="32" y2="24"/>
    <line x1="8" y1="0" x2="8" y2="32"/>
    <line x1="16" y1="0" x2="16" y2="32"/>
    <line x1="24" y1="0" x2="24" y2="32"/>
  </g>

  <!-- City skyline silhouette at bottom -->
  <g opacity="0.85">
    <rect x="1"  y="22" width="3"  height="9" rx="0.3" fill="#0d1f3c"/>
    <rect x="4"  y="19" width="2"  height="12" rx="0.3" fill="#0a1a35"/>
    <rect x="6"  y="21" width="4"  height="10" rx="0.3" fill="#0d1f3c"/>
    <rect x="10" y="18" width="3"  height="13" rx="0.3" fill="#081629"/>
    <rect x="13" y="23" width="2"  height="8" rx="0.3" fill="#0d1f3c"/>
    <rect x="15" y="20" width="3"  height="11" rx="0.3" fill="#0a1a35"/>
    <rect x="18" y="17" width="4"  height="14" rx="0.3" fill="#081629"/>
    <rect x="22" y="22" width="3"  height="9" rx="0.3" fill="#0d1f3c"/>
    <rect x="25" y="19" width="2"  height="12" rx="0.3" fill="#0a1a35"/>
    <rect x="27" y="23" width="4"  height="8" rx="0.3" fill="#0d1f3c"/>
  </g>

  <!-- Neon skyline glow line at horizon -->
  <line x1="0" y1="26" x2="32" y2="26" stroke="#ff0080" stroke-width="1.2" stroke-opacity="0.5" filter="url(#softGlow)"/>

  <!-- Window lights on buildings (tiny cyan dots) -->
  <g fill="#00e5ff" opacity="0.6" filter="url(#softGlow)">
    <rect x="2"  y="23" width="1" height="1"/>
    <rect x="2"  y="25" width="1" height="1"/>
    <rect x="7"  y="22" width="1" height="1"/>
    <rect x="9"  y="22" width="1" height="1"/>
    <rect x="7"  y="24" width="1" height="1"/>
    <rect x="11" y="20" width="1" height="1"/>
    <rect x="11" y="22" width="1" height="1"/>
    <rect x="16" y="21" width="1" height="1"/>
    <rect x="19" y="19" width="1" height="1"/>
    <rect x="19" y="21" width="1" height="1"/>
    <rect x="19" y="24" width="1" height="1"/>
    <rect x="23" y="23" width="1" height="1"/>
    <rect x="28" y="20" width="1" height="1"/>
    <rect x="28" y="24" width="1" height="1"/>
  </g>

  <!-- THE F - Bold lettermark inspired by GTA-style neon signage -->
  <!-- Layer 1: Outer magenta glow (danger accent) -->
  <path d="M 7 5 L 17 5 L 17 7.5 L 10 7.5 L 10 11.5 L 16 11.5 L 16 14 L 10 14 L 10 24 L 7 24 Z"
        fill="none" stroke="#ff0080" stroke-width="2.5" stroke-linejoin="round"
        filter="url(#innerGlow)" opacity="0.7"/>

  <!-- Layer 2: Inner cyan glow -->
  <path d="M 7 5 L 17 5 L 17 7.5 L 10 7.5 L 10 11.5 L 16 11.5 L 16 14 L 10 14 L 10 24 L 7 24 Z"
        fill="none" stroke="#00e5ff" stroke-width="1.8" stroke-linejoin="round"
        filter="url(#neonGlow)"/>

  <!-- Layer 3: Bright white core for tube effect -->
  <path d="M 7 5 L 17 5 L 17 7.5 L 10 7.5 L 10 11.5 L 16 11.5 L 16 14 L 10 14 L 10 24 L 7 24 Z"
        fill="none" stroke="#e0ffff" stroke-width="0.6" stroke-linejoin="round"/>

  <!-- Diagonal "slice" / graffiti cut - signature GTA move -->
  <line x1="12" y1="4" x2="19" y2="25"
        stroke="#ff0080" stroke-width="0.8" stroke-opacity="0.35"
        stroke-linecap="round" filter="url(#softGlow)"/>

  <!-- Progress bar - startup pitch deck / funding progress vibe -->
  <rect x="7" y="26.5" width="13" height="1.5" rx="0.75" fill="#0d1f3c" stroke="#00e5ff" stroke-width="0.4" opacity="0.8"/>
  <rect x="7" y="26.5" width="9"  height="1.5" rx="0.75" fill="#00e5ff" opacity="0.8" filter="url(#softGlow)"/>
</svg>